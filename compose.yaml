services:
  worker:
    image: ghcr.io/bonzosoft/pwsh:latest
    working_dir: ${PWD}
    #entrypoint: ["pwsh"]
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # permite ejecutar los servicios
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc:/host/etc:ro                  # acceso a la informacion del sistema
      - /mnt:/mnt:rw                       # acceso a las rutas importantes
      - ${PWD}/.config/gh:/root/.config/gh # mantiene la sesion de github entre ejecuciones